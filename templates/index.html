<!DOCTYPE html>
<html>
<head>
    <title>GenAI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            width: 700px;
            margin: 40px auto;
        }

        #chat {
            height: 500px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: blue;
            margin: 8px 0;
        }

        .bot {
            color: green;
            margin: 8px 0;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>GenAI Chatbot</h2>

<div id="chat"></div>

<input type="text" id="message" placeholder="Ask something..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {

    const input = document.getElementById("message");
    const message = input.value;

    if (!message) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;

    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message
        })
    });

    const data = await response.json();

    chat.innerHTML += `<div class="bot"><b>Bot:</b> ${data.response}</div>`;

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
